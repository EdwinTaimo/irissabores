<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Íris Sabores — Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="assets/icons/logo.png" type="image/png">
</head>
<body>
    <nav>
        <div class="nav-content">
            <img src="assets/icons/logo.png" alt="Logo" style="width:32px;height:32px;margin-right:10px;">
            <h2>Íris Sabores</h2>
            <div id="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <section class="hero">
        <h1>Escolha o seu sabor.</h1>
        <p>Produtos frescos entregues onde você estiver.</p>
    </section>

    <main class="container">
        <div class="tabs">
            <button onclick="filterMenu('Refeições')">Refeições</button>
            <button onclick="filterMenu('Pizzas')">Pizzas</button>
            <button onclick="filterMenu('Bebidas')">Bebidas</button>
        </div>
        <div id="product-grid" class="grid"></div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
